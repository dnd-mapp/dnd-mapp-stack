name: dnd-mapp
services:
    # ----------------------------------------------------------
    # Frontend
    # ----------------------------------------------------------
    dnd-mapp:
        image: dndmapp/dnd-mapp:dev
        container_name: dnd-mapp
        restart: unless-stopped
        profiles:
            - full
        depends_on:
            auth-server:
                condition: service_healthy
        ports:
            - '4200:4200/tcp'

    # ----------------------------------------------------------
    # Auth service
    # ----------------------------------------------------------
    auth-server:
        image: dndmapp/auth-server:dev
        container_name: auth-server
        restart: unless-stopped
        command: ['node', '/app/main.js']
        profiles:
            - auth
            - full
        depends_on:
            email-service:
                condition: service_healthy
                required: false
            auth-db-migration:
                condition: service_completed_successfully
            mariadb-server:
                condition: service_healthy
        env_file:
            - ./.env
        environment:
            - AUTH_SERVER_DB_PASSWORD_FILE=/run/secrets/auth-server-db-password
            - AUTH_SERVER_PASSWORD_PEPPER_FILE=/run/secrets/auth-server-password-pepper
        secrets:
            - auth-server-db-password
            - auth-server-password-pepper
        ports:
            - '4350:4350/tcp'

    auth-db-migration:
        image: dndmapp/auth-server:dev
        container_name: auth-db-migration
        restart: on-failure
        profiles:
            - auth
            - full
        entrypoint: ['/app/entrypoint.sh', 'migrate']
        env_file:
            - ./.env
        environment:
            - AUTH_SERVER_DB_PASSWORD_FILE=/run/secrets/auth-server-db-password
            - PRISMA_DB_PASSWORD_FILE=/run/secrets/prisma-db-password
        secrets:
            - auth-server-db-password
            - prisma-db-password
        depends_on:
            mariadb-server:
                condition: service_healthy

    # ----------------------------------------------------------
    # Email service
    # ----------------------------------------------------------
    email-service:
        image: dndmapp/email-service:dev
        container_name: email-service
        restart: unless-stopped
        entrypoint: ''
        profiles:
            - email
            - full
        depends_on:
            email-db-migration:
                condition: service_completed_successfully
            mariadb-server:
                condition: service_healthy
        env_file:
            - ./.env
        ports:
            - '4450:4450/tcp'

    email-db-migration:
        image: dndmapp/email-service:dev
        container_name: email-db-migration
        restart: on-failure
        profiles:
            - email
            - full
        entrypoint: ['/bin/sh', '-c', 'npx prisma migrate deploy && npx prisma db seed']
        env_file:
            - ./.env
        depends_on:
            mariadb-server:
                condition: service_healthy

    # ----------------------------------------------------------
    # Database (no profile — always starts)
    # ----------------------------------------------------------
    mariadb-server:
        image: mariadb:latest
        container_name: mariadb
        restart: unless-stopped
        ports:
            - '3306:3306/tcp'
        environment:
            - MARIADB_ROOT_PASSWORD_FILE=/run/secrets/root-password
            - AUTH_SERVER_DB_PASSWORD_FILE=/run/secrets/auth-server-db-password
            - EMAIL_SERVICE_DB_PASSWORD_FILE=/run/secrets/email-service-db-password
            - PRISMA_DB_PASSWORD_FILE=/run/secrets/prisma-db-password
            - AUTH_SERVER_DB_SCHEMA
            - AUTH_SERVER_DB_USER
            - EMAIL_SERVICE_DB_SCHEMA
            - EMAIL_SERVICE_DB_USER
            - PRISMA_DB_USER
        secrets:
            - root-password
            - auth-server-db-password
            - email-service-db-password
            - prisma-db-password
        volumes:
            - ./data/mariadb:/var/lib/mysql
            - ./mariadb-init.sh:/docker-entrypoint-initdb.d/mariadb-init.sh
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 3

    # ----------------------------------------------------------
    # Database admin UI
    # ----------------------------------------------------------
    dbeaver:
        image: dbeaver/cloudbeaver:latest
        container_name: dbeaver
        restart: unless-stopped
        depends_on:
            mariadb-server:
                condition: service_healthy
        ports:
            - '8978:8978/tcp'
        volumes:
            - ./data/dbeaver:/opt/cloudbeaver/workspace

secrets:
    root-password:
        file: ./secrets/mariadb/root.txt
    auth-server-db-password:
        file: ./secrets/auth-server/db-password.txt
    auth-server-password-pepper:
        file: ./secrets/auth-server/password-pepper.txt
    email-service-db-password:
        file: ./secrets/email-service/db-password.txt
    prisma-db-password:
        file: ./secrets/prisma/db-password.txt
